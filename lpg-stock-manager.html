<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>LPG Stock Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@500;700;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --charcoal:#181B1E;
    --panel:#222831;
    --panel-2:#2B313B;
    --line:#3A4250;
    --flame:#FF6A39;
    --flame-dim:#7a3a26;
    --amber:#FFB400;
    --green:#4CAF6D;
    --red:#E5484D;
    --ink:#EDEAE3;
    --ink-dim:#9aa3ad;
    --ink-faint:#69727d;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--charcoal);
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  #app{
    max-width:640px;
    margin:0 auto;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    position:relative;
    padding-bottom:84px;
  }
  .display{font-family:'Big Shoulders Display',sans-serif; letter-spacing:0.01em;}
  .mono{font-family:'JetBrains Mono',monospace;}

  /* HEADER */
  header.top{
    padding:20px 18px 14px;
    border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,#1C2024,#181B1E);
    position:sticky; top:0; z-index:5;
  }
  .top-row{display:flex; align-items:flex-start; justify-content:space-between; gap:10px;}
  .biz-name{font-family:'Big Shoulders Display',sans-serif; font-weight:800; font-size:26px; letter-spacing:0.02em; line-height:1; text-transform:uppercase; color:var(--ink);}
  .biz-sub{color:var(--ink-faint); font-size:12px; margin-top:4px; letter-spacing:0.04em; text-transform:uppercase;}
  .sync-btn{
    background:var(--panel-2); border:1px solid var(--line); color:var(--ink-dim);
    border-radius:10px; padding:8px 10px; font-size:11px; display:flex; align-items:center; gap:6px;
    cursor:pointer; font-family:'JetBrains Mono',monospace; white-space:nowrap;
  }
  .sync-btn:active{transform:scale(0.97);}
  .sync-dot{width:7px; height:7px; border-radius:50%; background:var(--green);}
  .sync-dot.busy{background:var(--amber); animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}

  /* ALERT BANNER */
  .alert-banner{
    margin:14px 18px 0; padding:12px 14px; border-radius:12px;
    background:linear-gradient(90deg,rgba(229,72,77,0.16),rgba(229,72,77,0.04));
    border:1px solid rgba(229,72,77,0.4);
    display:flex; gap:10px; align-items:flex-start; font-size:13px; color:#ffd5d6;
  }
  .alert-banner b{color:#fff;}

  main{flex:1; padding:16px 18px 8px;}
  .section-title{
    font-size:11px; text-transform:uppercase; letter-spacing:0.12em; color:var(--ink-faint);
    margin:18px 2px 10px; display:flex; justify-content:space-between; align-items:center;
  }

  /* STOCK GRID */
  .stock-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .stock-card{
    background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
    padding:14px; position:relative; overflow:hidden;
  }
  .stock-card.low{border-color:rgba(255,180,0,0.5);}
  .stock-card.critical{border-color:rgba(229,72,77,0.6);}
  .card-top{display:flex; justify-content:space-between; align-items:flex-start;}
  .cyl-label{font-family:'Big Shoulders Display',sans-serif; font-weight:700; font-size:20px; text-transform:uppercase;}
  .status-pill{font-size:9px; padding:3px 7px; border-radius:20px; text-transform:uppercase; letter-spacing:0.06em; font-weight:600;}
  .status-pill.ok{background:rgba(76,175,109,0.15); color:var(--green);}
  .status-pill.low{background:rgba(255,180,0,0.18); color:var(--amber);}
  .status-pill.critical{background:rgba(229,72,77,0.18); color:var(--red);}
  .card-body{display:flex; align-items:center; gap:12px; margin-top:10px;}
  .gauge-wrap{flex-shrink:0;}
  .counts{display:flex; flex-direction:column; gap:4px;}
  .count-row{display:flex; align-items:baseline; gap:6px;}
  .count-num{font-family:'JetBrains Mono',monospace; font-weight:700; font-size:20px;}
  .count-tag{font-size:10px; color:var(--ink-faint); text-transform:uppercase; letter-spacing:0.05em;}
  .cost-line{font-size:11px; color:var(--ink-dim); margin-top:10px; padding-top:8px; border-top:1px solid var(--line); font-family:'JetBrains Mono',monospace;}
  .cost-line.dim{color:var(--ink-faint); font-style:italic;}
  .total-value-banner{
    display:flex; justify-content:space-between; align-items:center;
    background:var(--panel-2); border:1px solid var(--line); border-radius:12px;
    padding:12px 14px; margin-bottom:12px; font-size:12px; color:var(--ink-dim);
  }
  .total-value-banner .mono{font-size:16px; font-weight:700; color:var(--ink);}

  /* ACTIONS */
  .action-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .action-btn{
    background:var(--panel); border:1px solid var(--line); border-radius:12px;
    padding:14px 12px; color:var(--ink); font-size:13px; font-weight:600;
    display:flex; flex-direction:column; gap:6px; align-items:flex-start; cursor:pointer;
    text-align:left;
  }
  .action-btn:active{transform:scale(0.98);}
  .action-btn .ic{font-size:18px;}
  .action-btn span.sub{font-size:11px; color:var(--ink-faint); font-weight:400;}

  /* BOTTOM NAV */
  nav.tabbar{
    position:fixed; bottom:0; left:50%; transform:translateX(-50%);
    width:100%; max-width:640px; background:rgba(24,27,30,0.97);
    backdrop-filter:blur(8px); border-top:1px solid var(--line);
    display:flex; justify-content:space-around; padding:8px 6px calc(8px + env(safe-area-inset-bottom));
    z-index:10;
  }
  .tab-btn{
    flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;
    background:none; border:none; color:var(--ink-faint); font-size:10px; padding:6px 2px;
    cursor:pointer; text-transform:uppercase; letter-spacing:0.04em;
  }
  .tab-btn.active{color:var(--flame);}
  .tab-ic{font-size:18px; line-height:1;}

  /* MODAL */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(10,12,14,0.75); z-index:50;
    display:flex; align-items:flex-end; justify-content:center;
  }
  .modal-sheet{
    background:var(--panel); width:100%; max-width:640px; border-radius:20px 20px 0 0;
    padding:18px 18px calc(20px + env(safe-area-inset-bottom)); max-height:88vh; overflow-y:auto;
    border-top:1px solid var(--line); animation:slideUp 0.2s ease-out;
  }
  @keyframes slideUp{from{transform:translateY(30px); opacity:0;} to{transform:translateY(0); opacity:1;}}
  .modal-handle{width:36px; height:4px; background:var(--line); border-radius:4px; margin:0 auto 14px;}
  .modal-title{font-family:'Big Shoulders Display',sans-serif; font-weight:700; font-size:20px; text-transform:uppercase; margin-bottom:14px;}
  .field-label{font-size:11px; text-transform:uppercase; letter-spacing:0.06em; color:var(--ink-faint); margin-bottom:6px; display:block;}
  .field{margin-bottom:14px;}
  select.field-input, input.field-input, textarea.field-input{
    width:100%; background:var(--panel-2); border:1px solid var(--line); color:var(--ink);
    border-radius:10px; padding:11px 12px; font-size:14px; font-family:'Inter',sans-serif;
  }
  textarea.field-input{resize:vertical; min-height:50px;}
  .type-pills{display:flex; flex-wrap:wrap; gap:8px;}
  .type-pill{
    background:var(--panel-2); border:1px solid var(--line); color:var(--ink-dim);
    border-radius:20px; padding:8px 14px; font-size:13px; cursor:pointer;
  }
  .type-pill.sel{background:var(--flame); border-color:var(--flame); color:#fff; font-weight:600;}
  .checkbox-row{display:flex; align-items:center; gap:10px; background:var(--panel-2); border:1px solid var(--line); border-radius:10px; padding:11px 12px;}
  .checkbox-row input{width:18px; height:18px; accent-color:var(--flame);}
  .checkbox-row label{font-size:13px; flex:1;}
  .btn-primary{
    width:100%; background:var(--flame); color:#fff; border:none; border-radius:12px;
    padding:14px; font-size:14px; font-weight:700; cursor:pointer; margin-top:6px;
    text-transform:uppercase; letter-spacing:0.04em;
  }
  .btn-primary:active{transform:scale(0.98);}
  .btn-secondary{
    width:100%; background:transparent; color:var(--ink-dim); border:1px solid var(--line);
    border-radius:12px; padding:12px; font-size:13px; cursor:pointer; margin-top:8px;
  }
  .btn-danger{color:var(--red); border-color:rgba(229,72,77,0.4);}
  .close-x{position:absolute; top:16px; right:16px; background:none; border:none; color:var(--ink-faint); font-size:20px; cursor:pointer;}

  /* LOG */
  .log-item{
    display:flex; gap:12px; padding:12px 0; border-bottom:1px solid var(--line); align-items:flex-start;
  }
  .log-ic{
    width:34px; height:34px; border-radius:10px; display:flex; align-items:center; justify-content:center;
    font-size:15px; flex-shrink:0; margin-top:1px;
  }
  .log-ic.in{background:rgba(76,175,109,0.15); color:var(--green);}
  .log-ic.out{background:rgba(255,106,57,0.15); color:var(--flame);}
  .log-ic.adj{background:rgba(255,180,0,0.15); color:var(--amber);}
  .log-main{flex:1; min-width:0;}
  .log-title-row{display:flex; justify-content:space-between; gap:8px;}
  .log-title{font-size:13px; font-weight:600;}
  .log-qty{font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:700; white-space:nowrap;}
  .log-meta{font-size:11px; color:var(--ink-faint); margin-top:2px;}
  .log-del{background:none; border:none; color:var(--ink-faint); font-size:16px; cursor:pointer; padding:4px;}
  .empty-state{text-align:center; padding:50px 20px; color:var(--ink-faint);}
  .empty-state .ic{font-size:36px; margin-bottom:10px;}

  /* SETTINGS */
  .settings-card{background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:14px; margin-bottom:12px;}
  .type-row{display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--line);}
  .type-row:last-child{border-bottom:none;}
  .type-row input{flex:1; min-width:0;}
  .type-row .th-input{max-width:64px; flex:none; text-align:center;}
  .icon-btn{background:none; border:none; color:var(--ink-faint); font-size:16px; cursor:pointer; padding:6px;}
  .icon-btn.danger{color:var(--red);}
  .toast{
    position:fixed; bottom:96px; left:50%; transform:translateX(-50%);
    background:var(--panel-2); border:1px solid var(--line); color:var(--ink);
    padding:10px 18px; border-radius:30px; font-size:13px; z-index:60; box-shadow:0 4px 20px rgba(0,0,0,0.4);
  }
</style>
</head>
<body>
<div id="app">
  <header class="top">
    <div class="top-row">
      <div>
        <div class="biz-name" id="bizNameDisplay">LPG STOCK</div>
        <div class="biz-sub">Inventory tracker</div>
      </div>
      <button class="sync-btn" id="syncBtn"><span class="sync-dot" id="syncDot"></span><span id="syncLabel">synced</span></button>
    </div>
  </header>
  <div id="alertZone"></div>
  <main id="main"></main>
  <nav class="tabbar">
    <button class="tab-btn" data-tab="dashboard"><span class="tab-ic">&#9678;</span>Stock</button>
    <button class="tab-btn" data-tab="record"><span class="tab-ic">&#10133;</span>Record</button>
    <button class="tab-btn" data-tab="log"><span class="tab-ic">&#9776;</span>Log</button>
    <button class="tab-btn" data-tab="settings"><span class="tab-ic">&#9881;</span>Setup</button>
  </nav>
</div>

<script>
(function(){
  "use strict";

  // ====================== GITHUB STORAGE CONFIG ======================
  // Fill these in before you publish. Use a Fine-grained Personal Access
  // Token scoped ONLY to this one repo, with "Contents: Read and write"
  // permission and nothing else. Because this repo must be PUBLIC for
  // free GitHub Pages, this token is visible to anyone who views the page
  // source — keep its scope minimal and rotate it if you ever suspect misuse.
  var GITHUB_CONFIG = {
    owner:  "YOUR_GITHUB_USERNAME",   // e.g. "somchai-lpg"
    repo:   "YOUR_REPO_NAME",         // e.g. "lpg-stock-manager"
    branch: "main",                   // branch GitHub Pages serves from
    path:   "data.json",              // file used to store inventory data
    token:  "YOUR_FINE_GRAINED_TOKEN" // ghp_... or github_pat_...
  };
  var currentFileSha = null; // tracks the file version for safe updates

  function utf8ToBase64(str){
    var bytes = new TextEncoder().encode(str);
    var binary = "";
    for(var i=0;i<bytes.length;i++) binary += String.fromCharCode(bytes[i]);
    return btoa(binary);
  }
  function base64ToUtf8(b64){
    var binary = atob(b64.replace(/\n/g, ""));
    var bytes = new Uint8Array(binary.length);
    for(var i=0;i<binary.length;i++) bytes[i] = binary.charCodeAt(i);
    return new TextDecoder().decode(bytes);
  }

  function ghHeaders(extra){
    var h = {
      "Authorization": "Bearer " + GITHUB_CONFIG.token,
      "Accept": "application/vnd.github+json"
    };
    if(extra) for(var k in extra) h[k] = extra[k];
    return h;
  }
  function ghUrl(){
    return "https://api.github.com/repos/" + GITHUB_CONFIG.owner + "/" + GITHUB_CONFIG.repo + "/contents/" + GITHUB_CONFIG.path;
  }

  async function ghReadFile(){
    var res = await fetch(ghUrl() + "?ref=" + GITHUB_CONFIG.branch + "&_=" + Date.now(), { headers: ghHeaders() });
    if(res.status === 404){ currentFileSha = null; return null; }
    if(!res.ok) throw new Error("GitHub read failed: " + res.status);
    var data = await res.json();
    currentFileSha = data.sha;
    return base64ToUtf8(data.content);
  }

  async function ghWriteFile(jsonStr, message){
    var body = {
      message: message || ("Update stock data " + new Date().toISOString()),
      content: utf8ToBase64(jsonStr),
      branch: GITHUB_CONFIG.branch
    };
    if(currentFileSha) body.sha = currentFileSha;
    var res = await fetch(ghUrl(), { method:"PUT", headers: ghHeaders({"Content-Type":"application/json"}), body: JSON.stringify(body) });
    if(res.status === 409 || res.status === 422){
      // Someone else changed the file since we last read it — refetch sha and retry once
      await ghReadFile();
      body.sha = currentFileSha;
      res = await fetch(ghUrl(), { method:"PUT", headers: ghHeaders({"Content-Type":"application/json"}), body: JSON.stringify(body) });
    }
    if(!res.ok) throw new Error("GitHub write failed: " + res.status);
    var data = await res.json();
    currentFileSha = data.content.sha;
  }
  // =====================================================================

  var state = null;
  var currentTab = "dashboard";
  var recordType = "supplier_in";
  var selectedTypeId = null;
  var newItemUnit = "cylinder";

  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

  function escapeHtml(s){
    return String(s == null ? "" : s).replace(/[&<>"']/g, function(c){
      return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];
    });
  }

  // unit: "cylinder" (full/empty tracking) or "piece" (simple count, e.g. regulators, hoses)
  function itemUnit(item){ return (item && item.unit === "piece") ? "piece" : "cylinder"; }

  function typesForUnit(unit){
    return unit === "piece"
      ? ["stock_in","stock_out","adjustment"]
      : ["supplier_in","sale","empty_return","send_to_supplier","adjustment"];
  }

  function unitForType(type){
    return (type === "stock_in" || type === "stock_out") ? "piece" : "cylinder";
  }

  var pillLabel = {
    supplier_in: "Delivery In",
    sale: "Sale Out",
    empty_return: "Empty Back",
    send_to_supplier: "Send Out",
    stock_in: "Stock In",
    stock_out: "Stock Out",
    adjustment: "Correction"
  };

  function ensureStock(item){
    if(!item) return {full:0, empty:0, qty:0};
    var unit = itemUnit(item);
    var s = state.stock[item.id];
    if(unit === "piece"){
      if(!s || typeof s.qty !== "number"){
        s = {qty: (s && typeof s.full === "number") ? s.full : 0};
      }
    } else {
      if(!s) s = {};
      if(typeof s.full !== "number") s.full = 0;
      if(typeof s.empty !== "number") s.empty = 0;
    }
    state.stock[item.id] = s;
    return s;
  }

  function getPrimaryCount(item, s){
    s = s || ensureStock(item);
    return itemUnit(item) === "piece" ? s.qty : s.full;
  }

  function defaultState(){
    var types = [
      {id: uid(), label: "5KG", unit: "cylinder", threshold: 10, costPrice: 0},
      {id: uid(), label: "12KG", unit: "cylinder", threshold: 8, costPrice: 0},
      {id: uid(), label: "45KG", unit: "cylinder", threshold: 4, costPrice: 0}
    ];
    var stock = {};
    types.forEach(function(t){ stock[t.id] = {full:0, empty:0}; });
    return {
      businessName: "LPG STOCK",
      currency: "฿",
      cylinderTypes: types,
      stock: stock,
      transactions: []
    };
  }

  function setSyncStatus(busy, label){
    document.getElementById("syncDot").className = "sync-dot" + (busy ? " busy" : "");
    document.getElementById("syncLabel").textContent = label || (busy ? "saving" : "synced");
  }

  function showToast(msg){
    var t = document.createElement("div");
    t.className = "toast";
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(function(){ t.remove(); }, 2200);
  }

  async function loadData(){
    setSyncStatus(true, "loading");
    try{
      var jsonStr = await ghReadFile();
      if(jsonStr){
        state = JSON.parse(jsonStr);
        if(!state.cylinderTypes) state.cylinderTypes = [];
        if(!state.stock) state.stock = {};
        if(!state.transactions) state.transactions = [];
        if(!state.currency) state.currency = "฿";
        state.cylinderTypes.forEach(function(t){
          if(typeof t.costPrice !== "number") t.costPrice = 0;
          if(t.unit !== "piece") t.unit = "cylinder";
          ensureStock(t);
        });
      } else {
        state = defaultState();
        await saveData(true);
      }
      setSyncStatus(false, "synced");
    } catch(e){
      console.error(e);
      if(!state) state = defaultState();
      setSyncStatus(false, "offline");
      showToast("Could not connect to GitHub — check the token/repo settings.");
    }
    renderAll();
  }

  async function saveData(silent){
    if(!silent) setSyncStatus(true, "saving");
    try{
      await ghWriteFile(JSON.stringify(state));
      setSyncStatus(false, "synced");
    } catch(e){
      console.error(e);
      setSyncStatus(false, "save failed");
      showToast("Could not save to GitHub — check your connection and try again.");
    }
  }

  function getStatus(item){
    var s = ensureStock(item);
    var primary = getPrimaryCount(item, s);
    if(primary <= 0) return "critical";
    if(primary <= item.threshold) return "low";
    return "ok";
  }

  function gaugeSVG(full, threshold, status){
    var max = Math.max(threshold * 2, full, 1);
    var pct = Math.max(0, Math.min(1, full / max));
    var h = 54, w = 34;
    var fillH = Math.round(h * pct);
    var color = status === "critical" ? "var(--red)" : status === "low" ? "var(--amber)" : "var(--green)";
    var clipId = "clip" + Math.random().toString(36).slice(2,8);
    return '<svg width="' + w + '" height="' + (h+10) + '" viewBox="0 0 ' + w + ' ' + (h+10) + '">' +
      '<defs><clipPath id="' + clipId + '"><rect x="2" y="' + (8 + (h - fillH)) + '" width="' + (w-4) + '" height="' + (fillH) + '" rx="3"/></clipPath></defs>' +
      '<rect x="2" y="8" width="' + (w-4) + '" height="' + h + '" rx="6" fill="none" stroke="var(--line)" stroke-width="2"/>' +
      '<rect x="' + (w/2 - 5) + '" y="0" width="10" height="9" rx="2" fill="var(--panel-2)" stroke="var(--line)" stroke-width="1.5"/>' +
      '<rect x="2" y="8" width="' + (w-4) + '" height="' + h + '" rx="6" fill="' + color + '" opacity="0.9" clip-path="url(#' + clipId + ')"/>' +
      '</svg>';
  }

  function renderAll(){
    renderAlerts();
    renderTabbar();
    if(currentTab === "dashboard") renderDashboard();
    else if(currentTab === "record") renderRecord();
    else if(currentTab === "log") renderLog();
    else if(currentTab === "settings") renderSettings();
    document.getElementById("bizNameDisplay").textContent = state.businessName || "LPG STOCK";
  }

  function renderTabbar(){
    document.querySelectorAll(".tab-btn").forEach(function(b){
      b.classList.toggle("active", b.getAttribute("data-tab") === currentTab);
    });
  }

  function renderAlerts(){
    var zone = document.getElementById("alertZone");
    var lowOnes = state.cylinderTypes.filter(function(t){ return getStatus(t) !== "ok"; });
    if(lowOnes.length === 0){ zone.innerHTML = ""; return; }
    var names = lowOnes.map(function(t){ return t.label; }).join(", ");
    zone.innerHTML = '<div class="alert-banner">&#9888;&#65039;<div><b>Low stock:</b> ' + escapeHtml(names) + ' running low.</div></div>';
  }

  function renderDashboard(){
    var main = document.getElementById("main");
    if(state.cylinderTypes.length === 0){
      main.innerHTML = '<div class="empty-state"><div class="ic">&#9678;</div>No items set up yet.<br><br><button class="btn-primary" style="width:auto;padding:10px 20px;" onclick="App.goTab(\'settings\')">Add item</button></div>';
      return;
    }
    var cards = state.cylinderTypes.map(function(t){
      var unit = itemUnit(t);
      var s = ensureStock(t);
      var status = getStatus(t);
      var primary = getPrimaryCount(t, s);
      var valueLine = t.costPrice > 0
        ? '<div class="cost-line">' + state.currency + (t.costPrice).toLocaleString() + ' / ' + (unit === "piece" ? "pc" : "cyl") + ' · value ' + state.currency + (primary * t.costPrice).toLocaleString() + '</div>'
        : '<div class="cost-line dim">No cost price set</div>';
      var countsHtml = unit === "piece"
        ? '<div class="counts"><div class="count-row"><span class="count-num">' + s.qty + '</span><span class="count-tag">In Stock</span></div></div>'
        : '<div class="counts">' +
            '<div class="count-row"><span class="count-num">' + s.full + '</span><span class="count-tag">Full</span></div>' +
            '<div class="count-row"><span class="count-num" style="color:var(--ink-dim);">' + s.empty + '</span><span class="count-tag">Empty</span></div>' +
          '</div>';
      return '<div class="stock-card ' + status + '">' +
        '<div class="card-top"><div class="cyl-label">' + escapeHtml(t.label) + '</div>' +
        '<div class="status-pill ' + status + '">' + (status === "ok" ? "OK" : status === "low" ? "Low" : "Empty") + '</div></div>' +
        '<div class="card-body">' +
          '<div class="gauge-wrap">' + gaugeSVG(primary, t.threshold, status) + '</div>' +
          countsHtml +
        '</div>' +
        valueLine +
      '</div>';
    }).join("");

    var totalValue = state.cylinderTypes.reduce(function(sum, t){
      return sum + (getPrimaryCount(t) * (t.costPrice || 0));
    }, 0);
    var valueBanner = totalValue > 0
      ? '<div class="total-value-banner"><span>Total stock value</span><span class="mono">' + state.currency + totalValue.toLocaleString() + '</span></div>'
      : "";

    var hasCylinder = state.cylinderTypes.some(function(t){ return itemUnit(t) === "cylinder"; });
    var hasPiece = state.cylinderTypes.some(function(t){ return itemUnit(t) === "piece"; });
    var quickButtons = "";
    if(hasCylinder){
      quickButtons +=
        '<button class="action-btn" onclick="App.quickRecord(\'supplier_in\')"><span class="ic">&#128666;</span>Supplier Delivery<span class="sub">Add full cylinders in</span></button>' +
        '<button class="action-btn" onclick="App.quickRecord(\'sale\')"><span class="ic">&#128176;</span>Sale / Delivery<span class="sub">Send full cylinders out</span></button>' +
        '<button class="action-btn" onclick="App.quickRecord(\'empty_return\')"><span class="ic">&#9851;</span>Empty Returned<span class="sub">Customer drops off empty</span></button>' +
        '<button class="action-btn" onclick="App.quickRecord(\'send_to_supplier\')"><span class="ic">&#128230;</span>Send to Supplier<span class="sub">Empties out for refill</span></button>';
    }
    if(hasPiece){
      quickButtons +=
        '<button class="action-btn" onclick="App.quickRecord(\'stock_in\')"><span class="ic">&#128230;</span>Stock In<span class="sub">Other items received</span></button>' +
        '<button class="action-btn" onclick="App.quickRecord(\'stock_out\')"><span class="ic">&#128176;</span>Stock Out<span class="sub">Other items sold or used</span></button>';
    }

    main.innerHTML =
      '<div class="section-title">Current Stock</div>' +
      valueBanner +
      '<div class="stock-grid">' + cards + '</div>' +
      '<div class="section-title">Quick Record</div>' +
      '<div class="action-grid">' + quickButtons + '</div>';
  }

  function recordTypeMeta(type){
    return {
      supplier_in: {label:"Supplier Delivery", desc:"Full cylinders received from your supplier.", qtyLabel:"Quantity received"},
      sale: {label:"Sale / Delivery", desc:"Full cylinders sold or delivered to a customer.", qtyLabel:"Quantity sold"},
      empty_return: {label:"Empty Returned", desc:"A customer returns an empty cylinder.", qtyLabel:"Quantity returned"},
      send_to_supplier: {label:"Send to Supplier", desc:"Empty cylinders sent back for refill.", qtyLabel:"Quantity sent"},
      stock_in: {label:"Stock In", desc:"Items received into inventory.", qtyLabel:"Quantity received"},
      stock_out: {label:"Stock Out", desc:"Items sold, used, or taken out of inventory.", qtyLabel:"Quantity removed"},
      adjustment: {label:"Stock Count Correction", desc:"Manually correct the recorded quantity after a physical count.", qtyLabel:""}
    }[type];
  }

  function renderRecord(){
    var main = document.getElementById("main");
    if(state.cylinderTypes.length === 0){
      main.innerHTML = '<div class="empty-state"><div class="ic">&#9678;</div>Add an item in Setup before recording activity.</div>';
      return;
    }
    if(!selectedTypeId || !state.cylinderTypes.find(function(t){ return t.id === selectedTypeId; })){
      selectedTypeId = state.cylinderTypes[0].id;
    }
    var selItem = state.cylinderTypes.find(function(t){ return t.id === selectedTypeId; });
    var unit = itemUnit(selItem);
    var validTypes = typesForUnit(unit);
    if(validTypes.indexOf(recordType) === -1) recordType = validTypes[0];

    var meta = recordTypeMeta(recordType);
    var typePills = state.cylinderTypes.map(function(t){
      var tag = itemUnit(t) === "piece" ? ' <span style="opacity:.6;font-size:11px;">(pcs)</span>' : '';
      return '<button class="type-pill ' + (t.id === selectedTypeId ? "sel" : "") + '" onclick="App.selectType(\'' + t.id + '\')">' + escapeHtml(t.label) + tag + '</button>';
    }).join("");

    var typeButtons = validTypes.map(function(typ){
      return '<button class="type-pill ' + (recordType === typ ? "sel" : "") + '" onclick="App.selectRecordType(\'' + typ + '\')">' + pillLabel[typ] + '</button>';
    }).join("");

    var currentStock = ensureStock(selItem);

    var bodyFields = "";
    if(recordType === "adjustment"){
      if(unit === "piece"){
        bodyFields = '<div class="field"><label class="field-label">Correct Quantity</label><input class="field-input" type="number" min="0" id="adjQty" value="' + currentStock.qty + '"></div>';
      } else {
        bodyFields =
          '<div class="field"><label class="field-label">Correct Full Count</label><input class="field-input" type="number" min="0" id="adjFull" value="' + currentStock.full + '"></div>' +
          '<div class="field"><label class="field-label">Correct Empty Count</label><input class="field-input" type="number" min="0" id="adjEmpty" value="' + currentStock.empty + '"></div>';
      }
    } else {
      bodyFields = '<div class="field"><label class="field-label">' + meta.qtyLabel + '</label><input class="field-input" type="number" min="1" id="qtyInput" placeholder="e.g. 5"></div>';
      if(recordType === "sale"){
        bodyFields += '<div class="field checkbox-row"><input type="checkbox" id="exchangeCheck"><label for="exchangeCheck">Customer exchanged an empty cylinder for this</label></div>';
      }
    }
    var partyLabel = (recordType === "supplier_in" || recordType === "send_to_supplier" || recordType === "stock_in") ? "Supplier name" : "Customer name";
    bodyFields += '<div class="field"><label class="field-label">' + partyLabel + ' (optional)</label><input class="field-input" type="text" id="partyInput" placeholder="Name"></div>';
    bodyFields += '<div class="field"><label class="field-label">Note (optional)</label><textarea class="field-input" id="noteInput" placeholder="Anything worth remembering about this entry"></textarea></div>';

    main.innerHTML =
      '<div class="section-title">Item</div>' +
      '<div class="type-pills" style="margin-bottom:16px;">' + typePills + '</div>' +
      '<div class="section-title">Activity Type</div>' +
      '<div class="type-pills" style="margin-bottom:16px;">' + typeButtons + '</div>' +
      '<div class="section-title">' + meta.label + '</div>' +
      '<div style="font-size:12px;color:var(--ink-faint);margin:-4px 2px 14px;">' + meta.desc + '</div>' +
      bodyFields +
      '<button class="btn-primary" onclick="App.submitRecord()">Save Entry</button>';
  }

  function renderLog(){
    var main = document.getElementById("main");
    var txns = state.transactions.slice().sort(function(a,b){ return b.ts - a.ts; });
    if(txns.length === 0){
      main.innerHTML = '<div class="empty-state"><div class="ic">&#9776;</div>No activity recorded yet.</div>';
      return;
    }
    var typeMap = {};
    state.cylinderTypes.forEach(function(t){ typeMap[t.id] = t.label; });
    var items = txns.map(function(tx){
      var unit = tx.unit || (function(){
        var it = state.cylinderTypes.find(function(x){ return x.id === tx.typeId; });
        return it ? itemUnit(it) : "cylinder";
      })();
      var iconClass = "adj", icon = "&#9881;", qtyText = "";
      if(tx.type === "supplier_in"){ iconClass="in"; icon="&#128666;"; qtyText = "+" + tx.qty + " full"; }
      else if(tx.type === "sale"){ iconClass="out"; icon="&#128176;"; qtyText = "-" + tx.qty + " full" + (tx.exchange ? " / +" + tx.qty + " empty" : ""); }
      else if(tx.type === "empty_return"){ iconClass="in"; icon="&#9851;"; qtyText = "+" + tx.qty + " empty"; }
      else if(tx.type === "send_to_supplier"){ iconClass="out"; icon="&#128230;"; qtyText = "-" + tx.qty + " empty"; }
      else if(tx.type === "stock_in"){ iconClass="in"; icon="&#128230;"; qtyText = "+" + tx.qty + " pcs"; }
      else if(tx.type === "stock_out"){ iconClass="out"; icon="&#128176;"; qtyText = "-" + tx.qty + " pcs"; }
      else if(tx.type === "adjustment"){
        iconClass="adj"; icon="&#9999;&#65039;";
        qtyText = unit === "piece" ? ("set " + tx.qty + " pcs") : ("set " + tx.full + "F / " + tx.empty + "E");
      }
      var dateStr = new Date(tx.ts).toLocaleString([], {month:"short", day:"numeric", hour:"2-digit", minute:"2-digit"});
      var metaParts = [typeMap[tx.typeId] || "?", dateStr];
      if(tx.party) metaParts.push(escapeHtml(tx.party));
      var metaLine = metaParts.join(" · ") + (tx.note ? "<br>" + escapeHtml(tx.note) : "");
      return '<div class="log-item">' +
        '<div class="log-ic ' + iconClass + '">' + icon + '</div>' +
        '<div class="log-main"><div class="log-title-row"><div class="log-title">' + recordTypeMeta(tx.type).label + '</div>' +
        '<div class="log-qty">' + qtyText + '</div></div>' +
        '<div class="log-meta">' + metaLine + '</div></div>' +
        '<button class="log-del" onclick="App.deleteTxn(\'' + tx.id + '\')" title="Delete entry">&#10005;</button>' +
      '</div>';
    }).join("");
    main.innerHTML = '<div class="section-title">Activity Log<span class="mono" style="font-size:11px;">' + txns.length + ' entries</span></div>' + items;
  }

  function renderSettings(){
    var main = document.getElementById("main");
    var typeRows = state.cylinderTypes.map(function(t){
      var badge = '<span style="font-size:9px;color:var(--ink-faint);border:1px solid var(--line);border-radius:6px;padding:3px 6px;text-transform:uppercase;letter-spacing:.04em;flex:none;white-space:nowrap;">' + (itemUnit(t) === "piece" ? "PCS" : "CYL") + '</span>';
      return '<div class="type-row">' +
        '<input class="field-input" style="padding:8px 10px;" value="' + escapeHtml(t.label) + '" onchange="App.updateTypeLabel(\'' + t.id + '\', this.value)">' +
        badge +
        '<input class="field-input th-input" style="padding:8px 6px;" type="number" min="0" value="' + t.threshold + '" onchange="App.updateTypeThreshold(\'' + t.id + '\', this.value)">' +
        '<input class="field-input th-input" style="padding:8px 6px;" type="number" min="0" step="0.01" value="' + (t.costPrice || 0) + '" onchange="App.updateTypeCost(\'' + t.id + '\', this.value)">' +
        '<button class="icon-btn danger" onclick="App.deleteType(\'' + t.id + '\')">&#128465;&#65039;</button>' +
      '</div>';
    }).join("") || '<div style="color:var(--ink-faint); font-size:13px; padding:8px 0;">No items yet — add one below.</div>';

    main.innerHTML =
      '<div class="section-title">Business Name</div>' +
      '<div class="settings-card"><input class="field-input" id="bizNameInput" value="' + escapeHtml(state.businessName) + '" onchange="App.updateBizName(this.value)"></div>' +
      '<div class="section-title">Currency Symbol</div>' +
      '<div class="settings-card"><input class="field-input" id="currencyInput" style="max-width:80px;" value="' + escapeHtml(state.currency) + '" onchange="App.updateCurrency(this.value)"></div>' +
      '<div class="section-title">Items, Threshold &amp; Cost Price</div>' +
      '<div class="settings-card">' +
        '<div style="display:flex; gap:10px; font-size:10px; text-transform:uppercase; color:var(--ink-faint); letter-spacing:0.05em; padding-bottom:6px;"><span style="flex:1;">Item</span><span style="width:34px; text-align:center;">Unit</span><span style="width:64px; text-align:center;">Alert at</span><span style="width:64px; text-align:center;">Cost</span><span style="width:28px;"></span></div>' +
        typeRows +
      '</div>' +
      '<div class="settings-card">' +
        '<div class="field"><label class="field-label">New item name</label><input class="field-input" id="newTypeLabel" placeholder="e.g. 12KG, Regulator, Hose"></div>' +
        '<div class="field"><label class="field-label">Unit type</label><div class="type-pills">' +
          '<button class="type-pill ' + (newItemUnit === "cylinder" ? "sel" : "") + '" onclick="App.selectNewUnit(\'cylinder\')">Cylinder (Full / Empty)</button>' +
          '<button class="type-pill ' + (newItemUnit === "piece" ? "sel" : "") + '" onclick="App.selectNewUnit(\'piece\')">Other Item (Pieces)</button>' +
        '</div></div>' +
        '<div class="field"><label class="field-label">Low-stock alert threshold</label><input class="field-input" id="newTypeThreshold" type="number" min="0" value="5"></div>' +
        '<div class="field"><label class="field-label">Cost price per unit (optional)</label><input class="field-input" id="newTypeCost" type="number" min="0" step="0.01" placeholder="0"></div>' +
        '<button class="btn-secondary" style="border-color:var(--flame); color:var(--flame);" onclick="App.addType()">Add Item</button>' +
      '</div>' +
      '<div class="section-title">Data</div>' +
      '<div class="settings-card"><div style="font-size:12px;color:var(--ink-faint); margin-bottom:8px;">Data is stored in this app\'s GitHub repository (data.json) and synced for everyone using this link.</div>' +
      '<button class="btn-secondary" onclick="App.manualRefresh()">Refresh from GitHub</button>' +
      '<button class="btn-secondary btn-danger" onclick="App.confirmClearAll()">Clear all data</button></div>';
  }

  // ---- Actions ----
  var App = {};

  App.goTab = function(tab){
    currentTab = tab;
    renderAll();
  };

  App.quickRecord = function(type){
    recordType = type;
    currentTab = "record";
    var unit = unitForType(type);
    var curItem = state.cylinderTypes.find(function(t){ return t.id === selectedTypeId; });
    if(!curItem || itemUnit(curItem) !== unit){
      var match = state.cylinderTypes.find(function(t){ return itemUnit(t) === unit; });
      if(match) selectedTypeId = match.id;
    }
    renderAll();
  };

  App.selectType = function(id){
    selectedTypeId = id;
    var item = state.cylinderTypes.find(function(t){ return t.id === id; });
    var unit = itemUnit(item);
    var validTypes = typesForUnit(unit);
    if(validTypes.indexOf(recordType) === -1) recordType = validTypes[0];
    renderRecord();
  };

  App.selectRecordType = function(type){
    recordType = type;
    var unit = unitForType(type);
    var curItem = state.cylinderTypes.find(function(t){ return t.id === selectedTypeId; });
    if(!curItem || itemUnit(curItem) !== unit){
      var match = state.cylinderTypes.find(function(t){ return itemUnit(t) === unit; });
      if(match) selectedTypeId = match.id;
    }
    renderRecord();
  };

  App.selectNewUnit = function(u){
    newItemUnit = u === "piece" ? "piece" : "cylinder";
    renderSettings();
  };

  App.submitRecord = async function(){
    if(!selectedTypeId) return;
    var item = state.cylinderTypes.find(function(x){ return x.id === selectedTypeId; });
    if(!item) return;
    var unit = itemUnit(item);
    var stock = ensureStock(item);
    var party = (document.getElementById("partyInput") || {}).value || "";
    var note = (document.getElementById("noteInput") || {}).value || "";
    var tx = {id: uid(), ts: Date.now(), typeId: selectedTypeId, type: recordType, unit: unit, party: party, note: note};

    if(recordType === "adjustment"){
      if(unit === "piece"){
        var newQty = parseInt(document.getElementById("adjQty").value, 10);
        if(isNaN(newQty)){ showToast("Enter a valid number."); return; }
        tx.qty = newQty;
        stock.qty = newQty;
      } else {
        var newFull = parseInt(document.getElementById("adjFull").value, 10);
        var newEmpty = parseInt(document.getElementById("adjEmpty").value, 10);
        if(isNaN(newFull) || isNaN(newEmpty)){ showToast("Enter valid numbers."); return; }
        tx.full = newFull; tx.empty = newEmpty;
        stock.full = newFull; stock.empty = newEmpty;
      }
    } else {
      var qty = parseInt((document.getElementById("qtyInput")||{}).value, 10);
      if(isNaN(qty) || qty <= 0){ showToast("Enter a quantity greater than 0."); return; }
      tx.qty = qty;
      if(recordType === "supplier_in"){ stock.full += qty; }
      else if(recordType === "sale"){
        var exch = document.getElementById("exchangeCheck") && document.getElementById("exchangeCheck").checked;
        stock.full = Math.max(0, stock.full - qty);
        tx.exchange = !!exch;
        if(exch) stock.empty += qty;
      }
      else if(recordType === "empty_return"){ stock.empty += qty; }
      else if(recordType === "send_to_supplier"){ stock.empty = Math.max(0, stock.empty - qty); }
      else if(recordType === "stock_in"){ stock.qty += qty; }
      else if(recordType === "stock_out"){ stock.qty = Math.max(0, stock.qty - qty); }
    }
    state.transactions.push(tx);
    await saveData();
    showToast("Entry saved");
    currentTab = "dashboard";
    renderAll();
  };

  App.deleteTxn = async function(id){
    if(!confirm("Delete this log entry? This won't undo the stock change it caused.")) return;
    state.transactions = state.transactions.filter(function(t){ return t.id !== id; });
    await saveData();
    renderLog();
  };

  App.updateBizName = async function(v){ state.businessName = v || "LPG STOCK"; await saveData(); document.getElementById("bizNameDisplay").textContent = state.businessName; };
  App.updateTypeLabel = async function(id, v){
    var t = state.cylinderTypes.find(function(x){ return x.id === id; });
    if(t){ t.label = v || t.label; await saveData(); }
  };
  App.updateTypeThreshold = async function(id, v){
    var t = state.cylinderTypes.find(function(x){ return x.id === id; });
    var n = parseInt(v,10);
    if(t && !isNaN(n)){ t.threshold = n; await saveData(); }
  };
  App.updateTypeCost = async function(id, v){
    var t = state.cylinderTypes.find(function(x){ return x.id === id; });
    var n = parseFloat(v);
    if(t && !isNaN(n) && n >= 0){ t.costPrice = n; await saveData(); }
  };
  App.updateCurrency = async function(v){
    state.currency = v && v.trim() ? v.trim() : "฿";
    await saveData();
  };
  App.deleteType = async function(id){
    var t = state.cylinderTypes.find(function(x){ return x.id === id; });
    var unit = itemUnit(t);
    var s = ensureStock(t);
    var msg = "Delete " + (t ? t.label : "this item") + "?";
    if(unit === "piece"){
      if(s.qty > 0) msg += " It still has " + s.qty + " units on record.";
    } else {
      if(s.full > 0 || s.empty > 0) msg += " It still has " + s.full + " full and " + s.empty + " empty cylinders on record.";
    }
    if(!confirm(msg)) return;
    state.cylinderTypes = state.cylinderTypes.filter(function(x){ return x.id !== id; });
    delete state.stock[id];
    await saveData();
    renderSettings();
  };
  App.addType = async function(){
    var label = document.getElementById("newTypeLabel").value.trim();
    var unit = newItemUnit === "piece" ? "piece" : "cylinder";
    var threshold = parseInt(document.getElementById("newTypeThreshold").value, 10);
    var costPrice = parseFloat(document.getElementById("newTypeCost").value);
    if(!label){ showToast("Enter an item name first."); return; }
    if(isNaN(threshold) || threshold < 0) threshold = 5;
    if(isNaN(costPrice) || costPrice < 0) costPrice = 0;
    var t = {id: uid(), label: label.toUpperCase(), unit: unit, threshold: threshold, costPrice: costPrice};
    state.cylinderTypes.push(t);
    state.stock[t.id] = unit === "piece" ? {qty:0} : {full:0, empty:0};
    newItemUnit = "cylinder";
    await saveData();
    renderSettings();
    showToast("Added " + t.label);
  };
  App.confirmClearAll = async function(){
    if(!confirm("This will permanently erase all stock, items and history for everyone using this app. Continue?")) return;
    if(!confirm("Are you absolutely sure? This cannot be undone.")) return;
    state = defaultState();
    await saveData();
    renderAll();
    showToast("All data cleared");
  };
  App.manualRefresh = async function(){
    await loadData();
    showToast("Refreshed from GitHub");
  };

  window.App = App;

  document.querySelectorAll(".tab-btn").forEach(function(b){
    b.addEventListener("click", function(){ App.goTab(b.getAttribute("data-tab")); });
  });
  document.getElementById("syncBtn").addEventListener("click", function(){ App.manualRefresh(); });

  document.addEventListener("visibilitychange", function(){
    if(document.visibilityState === "visible") loadData();
  });

  loadData();
})();
</script>
</body>
</html>
